apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dubeygaurav-tech/ai-platform-infra'
    targetRevision: HEAD
    path: manifests/monitoring/ # Look here for raw YAMLs
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring