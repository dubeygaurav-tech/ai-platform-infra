apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: master-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dubeygaurav-tech/ai-platform-infra'
    targetRevision: HEAD
    path: apps # ArgoCD will watch this folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true