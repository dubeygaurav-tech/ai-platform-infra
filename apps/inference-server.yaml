apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dubeygaurav-tech/ai-platform-infra'
    targetRevision: HEAD
    path: manifests/inference-server/ 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-workloads # Ensure this matches your target
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    - Replace=true # <--- THIS IS REQUIRED